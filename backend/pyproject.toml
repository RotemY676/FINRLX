# Phase MVP-6a: lint + type baseline. Intentionally permissive — the goal is
# to land green CI on top of 716 existing tests, not to chase strict typing.
# Tighten in subsequent phases.

[tool.ruff]
target-version = "py311"
line-length = 110
extend-exclude = [
    "migrations/versions",
    ".pytest_cache",
    "__pycache__",
]

[tool.ruff.lint]
# E + F = pyflakes + pycodestyle errors. W = whitespace warnings. I = import
# sort. UP = pyupgrade (catches dead Python 2 / pre-3.11 patterns).
# B = bugbear (subtle correctness issues). We deliberately skip ANN (annotation
# strictness) and D (docstrings) — those are MVP-7 territory.
select = ["E", "F", "W", "I", "UP", "B"]
ignore = [
    "E501",   # line too long — formatter handles real cases; ignore in lint
    "B008",   # function call in argument default (FastAPI Depends() pattern)
    "B904",   # raise-from — we sometimes raise generic HTTPException intentionally
    "UP007",  # `X | Y` over `Optional[X]` — leave existing code alone for now
    "UP035",  # `typing.X` deprecations — same
]

[tool.ruff.lint.per-file-ignores]
# Tests are allowed to use star imports, fixtures with unused args, etc.
"tests/**/*.py" = ["E712", "F401", "F811", "B015", "B017"]
# Seed scripts are throwaway.
"seed.py" = ["E402", "F401"]
# __init__.py files re-export symbols intentionally; F401 for them is noise.
"**/__init__.py" = ["F401"]
# engines.py:run_engines had a latent bug where the ML branch referenced `run`
# before it was constructed. Fixed in Phase C1 (2026-05-21) by hoisting the
# SignalRun construction above the category branch. The per-file F821 ignore
# is removed; if it regresses, ruff catches it on the next CI run.
# OHLCV variable shorthand (`o`, `h`, `l`, `c`) is unambiguous in a market-data
# context. The lint rule flags `l` as visually similar to `1`.
"app/services/data_providers/validation.py" = ["E741"]
"app/services/ingest.py" = ["E741"]
# finrlx_research.py sets up `logger` before doing optional heavy imports
# behind `try/except ImportError` blocks; the imports must follow.
"app/services/finrlx_research.py" = ["E402", "E741"]

[tool.mypy]
# Graduated typing strategy: mypy is the gate for `app/core/` + `app/schemas/`
# (Phase C3 added schemas/ — 32 source files, clean). `app/api/` transitively
# pulls in `app/services/finrlx_research.py` which currently produces ~60 type
# errors; bringing it under the gate is its own multi-day cleanup tracked as
# a follow-up.
python_version = "3.11"
ignore_missing_imports = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false
warn_unused_ignores = false
warn_return_any = false
warn_redundant_casts = true
warn_unreachable = true
files = ["app/core/", "app/schemas/"]
