name: CI

# Minutes budget (private repo, 2,000 free Actions min/month): CI runs on PRs to
# main and on manual dispatch — NOT on every push to main. Frequent direct pushes
# used to trigger a run each, which exhausted the free tier. The heavy Playwright
# e2e job (chromium install + browser run + trace artifacts) was removed from CI;
# run it locally with `npm run e2e:ci` when touching visible flows.
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel earlier runs of the same branch — devs push frequently in MVP.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (lint + types + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff lint
        run: python -m ruff check app/

      - name: Mypy type-check (app/core/ only — graduated typing baseline)
        run: python -m mypy

      - name: Pytest
        env:
          # Force the local-dev JWT secret so guard_jwt_secret accepts the
          # SQLite test config. (Real prod sets a real secret in Railway.)
          JWT_SECRET: dev-only-not-for-production-jwt-secret-rotate-me-please
        run: python -m pytest tests/ --tb=short -q

  frontend:
    name: frontend (typecheck + tests + build)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Vitest unit tests
        run: npm run test:ci

      - name: Next.js build
        run: npm run build
